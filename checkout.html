<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">

<div class="logo">Checkout</div>

<a href="cart.html" class="cart-btn">⬅ Back</a>

</header>

<div class="checkout">

<input id="name" placeholder="Full Name">

<input id="address" placeholder="Address">

<input id="phone" placeholder="Phone Number">

<button onclick="goPayment()">Continue to Payment</button>

</div>

<script>

function goPayment(){

let name=document.getElementById("name").value
let address=document.getElementById("address").value
let phone=document.getElementById("phone").value

localStorage.setItem("orderName",name)
localStorage.setItem("orderAddress",address)
localStorage.setItem("orderPhone",phone)

window.location.href="payment.html"

}

</script>

</body>
</html>
