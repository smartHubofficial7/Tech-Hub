<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<input id="phone" placeholder="Phone Number">

</button>

</div>

<script src="script.js"></script>

</body>
</html>
