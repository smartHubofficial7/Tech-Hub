<!DOCTYPE html>
<html>
<head>
<title>Login</title>
</head>

<body>

<h2>Login</h2>

<input id="name" placeholder="Enter Name">
<br><br>

<button onclick="login()">Login</button>

<script>

function login(){

let name=document.getElementById("name").value;

localStorage.setItem("user",name);

alert("Login Success");

window.location.href="index.html";

}

</script>

</body>
</html>
