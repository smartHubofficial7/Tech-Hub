<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Hub Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<h1>Tech Hub Store</h1>

<input id="search" placeholder="Search product..." onkeyup="searchProduct()">

<a href="cart.html" class="cart-btn">
🛒 Cart (<span id="count">0</span>)
</a>

</header>

<section class="products" id="products">

<div class="product">
<img src="https://m.media-amazon.com/images/I/71d7rfSl0wL._SX679_.jpg">
<h3>iPhone 15</h3>
<p>₹79999</p>
<button onclick="addToCart('iPhone 15',79999)">Add to Cart</button>
<button onclick="buyNow('iPhone 15',79999)" class="buy">Buy Now</button>
</div>

<div class="product">
<img src="https://m.media-amazon.com/images/I/71Sa3dqj9UL._SX679_.jpg">
<h3>Samsung Galaxy S24</h3>
<p>₹74999</p>
<button onclick="addToCart('Samsung Galaxy S24',74999)">Add to Cart</button>
<button onclick="buyNow('Samsung Galaxy S24',74999)" class="buy">Buy Now</button>
</div>

<div class="product">
<img src="https://m.media-amazon.com/images/I/61BAuSC0UnL._SX679_.jpg">
<h3>OnePlus 12</h3>
<p>₹64999</p>
<button onclick="addToCart('OnePlus 12',64999)">Add to Cart</button>
<button onclick="buyNow('OnePlus 12',64999)" class="buy">Buy Now</button>
</div>

<div class="product">
<img src="https://m.media-amazon.com/images/I/61uA2UVnYWL._SX679_.jpg">
<h3>Boat Earbuds</h3>
<p>₹1999</p>
<button onclick="addToCart('Boat Earbuds',1999)">Add to Cart</button>
<button onclick="buyNow('Boat Earbuds',1999)" class="buy">Buy Now</button>
</div>

</section>

<footer>
© 2026 Tech Hub Store
</footer>

<script src="script.js"></script>

</body>
</html>
